name: Bug report
description: Something wrong with a released build of qTracker
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please use a [release build](https://github.com/Qinaii/qtracker-spaceaces/releases), not a dev copy.

  - type: input
    id: version
    attributes:
      label: qTracker version
      placeholder: e.g. 1.2.0 (About or window title)
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: What did you do before the issue appeared?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: stat
    attributes:
      label: Affected stat(s)
      options:
        - Uridium
        - EP / XP
        - Credits
        - Honor
        - Multiple
        - Other / UI only
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Resolution, game window mode, screenshot, debug snapshot if available
      placeholder: Optional
